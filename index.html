<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مفاجأة ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     ❤️  اللي محتاج تغيّره موجود كله تحت في CONFIG في الـ JavaScript
     ========================================================= */

  :root{
    --night-1:#14082b;
    --night-2:#2a1454;
    --night-3:#3d1e6d;
    --rose:#ff7eb3;
    --gold:#ffd479;
    --cream:#fff4e6;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{ height:100%; overflow:hidden; }

  body{
    font-family:'Tajawal', sans-serif;
    background:radial-gradient(ellipse at 50% 120%, var(--night-3) 0%, var(--night-2) 35%, var(--night-1) 100%);
    color:var(--cream);
    position:relative;
    width:100%;
    height:100dvh;
    overflow:hidden;
  }

  /* ---------- طبقة الصور اللي ورا ---------- */
  #photoLayer{
    position:fixed; inset:0; z-index:0;
  }
  #photoLayer .photo{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    opacity:0;
    transition:opacity 2.5s ease-in-out;
    transform:scale(1.08);
    animation:slowZoom 18s ease-in-out infinite alternate;
  }
  #photoLayer .photo.active{ opacity:1; }
  @keyframes slowZoom{ from{transform:scale(1.04);} to{transform:scale(1.16);} }

  /* غطاء غامق فوق الصور عشان الكلام يبان */
  #overlay{
    position:fixed; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(20,8,43,.78) 0%, rgba(20,8,43,.55) 50%, rgba(20,8,43,.85) 100%);
  }

  /* ---------- النجوم ---------- */
  #stars{ position:fixed; inset:0; z-index:1; pointer-events:none; }

  /* ---------- الكانفس بتاع الألعاب النارية ---------- */
  #fireworks{ position:fixed; inset:0; z-index:3; pointer-events:none; }

  /* ---------- المحتوى ---------- */
  #content{
    position:relative; z-index:4;
    height:100dvh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:28px;
    gap:22px;
  }

  .fade-in{ animation:fadeUp 1.4s ease both; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(22px);} to{opacity:1; transform:translateY(0);} }

  .eyebrow{
    font-size:15px; letter-spacing:2px; color:var(--rose);
    text-transform:none; opacity:.9;
  }

  h1{
    font-family:'Aref Ruqaa', serif;
    font-weight:700;
    font-size:clamp(34px, 9vw, 64px);
    line-height:1.5;
    color:var(--cream);
    text-shadow:0 2px 30px rgba(255,126,179,.4);
  }

  .message{
    font-size:clamp(16px, 4.4vw, 21px);
    line-height:2; max-width:640px;
    color:#f3e3ff; opacity:.95;
  }
  .message .name{ color:var(--gold); font-weight:700; }

  /* ---------- العداد ---------- */
  #countdown{
    display:flex; gap:14px; margin-top:8px;
    direction:ltr;
  }
  .unit{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,212,121,.25);
    border-radius:18px;
    padding:16px 14px; min-width:74px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 30px rgba(0,0,0,.3);
  }
  .unit .num{
    font-family:'Tajawal'; font-weight:700;
    font-size:clamp(26px, 8vw, 40px); color:var(--gold);
    line-height:1;
  }
  .unit .lbl{
    font-size:12px; margin-top:8px; color:#d9c9ff; letter-spacing:.5px;
  }

  /* ---------- اللعبة ---------- */
  #heartLayer{ position:fixed; inset:0; z-index:5; pointer-events:none; overflow:hidden; }
  .float-heart{
    position:absolute; bottom:-60px;
    font-size:38px; line-height:1;
    pointer-events:auto; cursor:pointer;
    user-select:none; -webkit-user-select:none;
    filter:drop-shadow(0 4px 12px rgba(255,126,179,.5));
    will-change:transform;
  }
  .float-heart.pop{ animation:pop .3s ease forwards !important; pointer-events:none; }
  .float-heart img{
    width:100%; height:auto; display:block;
    pointer-events:none; -webkit-user-drag:none; user-select:none;
  }
  @keyframes pop{ to{ transform:scale(2); opacity:0; } }
  @keyframes floatUp{
    from{ transform:translateY(0) rotate(0deg); }
    to{ transform:translateY(-115vh) rotate(var(--rot,20deg)); }
  }
  .score-popup{
    position:absolute; pointer-events:none; z-index:6;
    color:var(--gold); font-weight:700; font-size:22px;
    animation:popUp .7s ease forwards;
  }
  @keyframes popUp{ from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-40px);} }
  .score-popup.minus{ color:#ff6b6b; }

  #gameUI{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .game-instruction{ font-size:17px; color:#f3e3ff; }
  .score-pill{
    direction:ltr;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,126,179,.35);
    border-radius:50px; padding:10px 22px;
    font-size:22px; font-weight:700; color:var(--cream);
    backdrop-filter:blur(6px);
  }
  .score-pill #score{ color:var(--gold); }

  /* الزرار وهو مقفول */
  #giftBtn.locked{
    opacity:.35; filter:grayscale(.7);
    cursor:not-allowed; pointer-events:none;
    animation:none;
  }
  #giftBtn.unlocked{ animation:pulse 2s ease-in-out infinite, fadeUp .8s ease both; }

  /* ---------- زرار الهدية ---------- */
  #giftBtn{
    display:none;
    margin-top:12px;
    font-family:'Tajawal', sans-serif; font-weight:700; font-size:19px;
    color:#3a0f2a;
    background:linear-gradient(135deg, var(--gold), var(--rose));
    border:none; border-radius:50px;
    padding:18px 36px;
    cursor:pointer;
    box-shadow:0 10px 40px rgba(255,126,179,.5);
    animation:pulse 2s ease-in-out infinite, fadeUp 1s ease both;
    transition:transform .15s ease;
  }
  #giftBtn:active{ transform:scale(.95); }
  @keyframes pulse{
    0%,100%{ box-shadow:0 10px 40px rgba(255,126,179,.45); }
    50%{ box-shadow:0 10px 55px rgba(255,212,121,.75); }
  }
  #giftBtn .heart{ display:inline-block; animation:beat 1s infinite; }
  @keyframes beat{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.25);} }

  /* ---------- الفيديو ---------- */
  #videoWrap{
    width:100%; max-width:540px; margin-top:10px;
    border-radius:20px; overflow:hidden;
    box-shadow:0 14px 50px rgba(0,0,0,.5);
    border:2px solid rgba(255,212,121,.3);
    animation:fadeUp .8s ease both;
  }
  #videoWrap video{ width:100%; height:auto; display:block; background:#000; }
  #videoWrap iframe{ width:100%; aspect-ratio:16/9; display:block; border:0; }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:opacity .4s ease !important; }
  }
</style>
</head>
<body>

  <div id="photoLayer"></div>
  <div id="overlay"></div>
  <canvas id="stars"></canvas>
  <canvas id="fireworks"></canvas>
  <div id="heartLayer"></div>

  <div id="content">
    <!-- مرحلة الانتظار -->
    <div id="waiting" class="fade-in">
      <p class="eyebrow">في حاجة حلوة بتقرب…</p>
      <h1 id="waitTitle">استنّي شوية يا حبيبتي ❤️</h1>
      <p class="message" id="waitMsg">
        فاضل كام ثانية على لحظة جميلة جداً…<br>عينيكي على العدّاد 👇
      </p>
      <div id="countdown">
        <div class="unit"><div class="num" id="hh">00</div><div class="lbl">ساعة</div></div>
        <div class="unit"><div class="num" id="mm">00</div><div class="lbl">دقيقة</div></div>
        <div class="unit"><div class="num" id="ss">00</div><div class="lbl">ثانية</div></div>
      </div>
    </div>

    <!-- مرحلة عيد الميلاد -->
    <div id="celebrate" class="hidden">
      <p class="eyebrow">🎉 خلاص بقت الساعة ١٢ 🎉</p>
      <h1 id="bdayTitle"></h1>
      <p class="message" id="bdayMsg"></p>

      <div id="gameUI" class="hidden">
        <p class="game-instruction" id="gameInstruction">جمّعي ٢٦ نقطة! المسي القلوب والستيكرز الحلوة 💕 وبُعدي عن الوحشين 😈</p>
        <div class="score-pill">❤️ <span id="score">0</span> / <span id="target">26</span></div>
      </div>

      <button id="giftBtn"><span class="heart">🎁</span> <span id="giftBtnText"></span></button>
      <div id="videoWrap" class="hidden"></div>
    </div>
  </div>

<script>
/* ============================================================
   ❤️❤️❤️   الجزء اللي بتعدّله إنت   ❤️❤️❤️
   ============================================================ */
const CONFIG = {

  // اسم حبيبتك (هيظهر في الرسايل)
  herName: "لولو",

  // معاد عيد الميلاد = نص الليل
  // الصيغة: "سنة-شهر-يوم T ساعة:دقيقة:ثانية"
  // دلوقتي محطوط على نص الليل النهاردة (أول ما الساعة تبقى 12 بليل)
  birthday: "2026-06-15T00:00:00",

  // صور حبيبتك — حط الروابط هنا (تقدر تحط أي عدد)
  // سيبها فاضية [] لو لسه مش جاهز، الخلفية هتفضل سما ونجوم حلوة
  photos: [
    // "https://example.com/photo1.jpg",
    // "https://example.com/photo2.jpg",
  ],

  // ===== الفيديو اللي هيشتغل لما تدوس الزرار =====
  // نوع الفيديو: "file" لو رافع ملف جنب الموقع، أو "youtube" لو حاطه على يوتيوب
  videoType: "file",
  // لو file: اسم الملف اللي هترفعه جنب index.html (مثلاً "video.mp4")
  // لو youtube: حط لينك الفيديو كامل أو الـ ID بتاعه
  videoSrc: "video.mp4",
  // الكلام اللي هيكون على الزرار اللي هتدوس عليه
  buttonText: "افتحي هديتك 🎁",

  // ===== اللعبة قبل الهدية =====
  gameEnabled: true,   // خليها false لو عايز تشيل اللعبة
  targetPoints: 26,    // النقط المطلوبة (سن لولو 🎂)

  // الرسالة الرومانسية بتاعة عيد الميلاد
  bdayTitle: "كل سنة وانتي طيبة يا لولو 🎂",
  bdayMessage:
    "في اللحظة دي بالظبط يا حبيبتي، نفسي أكون أول واحد يقولك كل سنة وانتي طيبة. " +
    "إنتي أحلى حاجة حصلتلي، وكل يوم معاكي بيبقى أحلى من اللي قبله. " +
    "بحبك أوي ❤️ … دوسي على الزرار خليني أشوف ضحكتك دلوقتي.",
};
/* ============================================================
   من هنا وتحت مش محتاج تغيّر حاجة (إلا لو حابب طبعاً)
   ============================================================ */

/* ---------- الصور ---------- */
(function initPhotos(){
  const layer = document.getElementById('photoLayer');
  if(!CONFIG.photos || CONFIG.photos.length === 0) return;
  CONFIG.photos.forEach((url, i) => {
    const d = document.createElement('div');
    d.className = 'photo' + (i === 0 ? ' active' : '');
    d.style.backgroundImage = `url("${url}")`;
    layer.appendChild(d);
  });
  if(CONFIG.photos.length > 1){
    let idx = 0;
    const slides = layer.querySelectorAll('.photo');
    setInterval(() => {
      slides[idx].classList.remove('active');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('active');
    }, 5000);
  }
})();

/* ---------- النجوم ---------- */
(function initStars(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({length: Math.min(140, Math.floor(innerWidth/8))}, () => ({
      x: Math.random()*c.width,
      y: Math.random()*c.height,
      r: Math.random()*1.4 + .3,
      a: Math.random(),
      s: Math.random()*0.02 + 0.005
    }));
  }
  resize(); addEventListener('resize', resize);
  (function loop(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(st => {
      st.a += st.s; if(st.a > 1 || st.a < 0) st.s *= -1;
      ctx.globalAlpha = Math.abs(st.a);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, 7); ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  })();
})();

/* ---------- العداد التنازلي ---------- */
const target = new Date(CONFIG.birthday).getTime();
let celebrated = false;
const hhEl = document.getElementById('hh');
const mmEl = document.getElementById('mm');
const ssEl = document.getElementById('ss');
const pad = n => String(n).padStart(2,'0');

function tick(){
  const diff = target - Date.now();
  if(diff <= 0){
    if(!celebrated) startCelebration();
    return;
  }
  const totalSec = Math.floor(diff/1000);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  hhEl.textContent = pad(h);
  mmEl.textContent = pad(m);
  ssEl.textContent = pad(s);
  requestAnimationFrame(() => setTimeout(tick, 250));
}
tick();

/* ---------- الاحتفال + الفيديو ---------- */
function youtubeId(src){
  // بياخد لينك يوتيوب كامل أو ID ويطلّع الـ ID
  const m = src.match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : src.trim();
}

function revealVideo(){
  const btn = document.getElementById('giftBtn');
  const wrap = document.getElementById('videoWrap');
  btn.style.display = 'none';
  wrap.classList.remove('hidden');

  if(CONFIG.videoType === 'youtube'){
    const id = youtubeId(CONFIG.videoSrc);
    wrap.innerHTML =
      '<iframe src="https://www.youtube.com/embed/' + id +
      '?autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media; fullscreen" ' +
      'allowfullscreen frameborder="0"></iframe>';
  } else {
    // ملف فيديو
    const v = document.createElement('video');
    v.src = CONFIG.videoSrc;
    v.setAttribute('playsinline','');
    v.controls = true;
    v.autoplay = true;
    wrap.appendChild(v);
    // الضغط على الزرار = تفاعل من المستخدم، فالصوت مسموح
    const p = v.play();
    if(p && p.catch) p.catch(() => { v.muted = false; });
  }
}

function startCelebration(){
  celebrated = true;
  document.getElementById('waiting').classList.add('hidden');
  const cel = document.getElementById('celebrate');
  cel.classList.remove('hidden');
  cel.classList.add('fade-in');

  document.getElementById('bdayTitle').textContent = CONFIG.bdayTitle;
  document.getElementById('bdayMsg').innerHTML =
    CONFIG.bdayMessage.replace(/حبيبتي/g, `<span class="name">${CONFIG.herName}</span>`);

  const btn = document.getElementById('giftBtn');
  document.getElementById('giftBtnText').textContent =
    CONFIG.buttonText.replace(/^🎁\s*/,'');
  btn.style.display = 'inline-block';
  btn.addEventListener('click', revealVideo);

  if(CONFIG.gameEnabled){
    btn.classList.add('locked');
    document.getElementById('gameUI').classList.remove('hidden');
    startGame();
  }

  launchFireworks();
}

  const layer = document.getElementById('heartLayer');
  const scoreEl = document.getElementById('score');
  const targetEl = document.getElementById('target');
  const target = CONFIG.targetPoints;
  let score = 0, spawning = true;
  targetEl.textContent = target;
  scoreEl.textContent = 0;

  const hearts = ['❤️','💖','💗','💕','💘','🩷'];

    if(!spawning) return;
    const el = document.createElement('div');
    el.className = 'float-heart';

    const useSticker = STICKERS.length > 0 && Math.random() < 0.45;
    let worth;

    if(useSticker){
      const st = STICKERS[Math.floor(Math.random()*STICKERS.length)];
      worth = st.worth;
      el.style.width = (62 + Math.random()*22) + 'px';
      const img = document.createElement('img');
      img.src = st.src; img.draggable = false;
      el.appendChild(img);
    } else {
      const special = Math.random() < 0.12;          // قلب دهبي = 3 نقط
      worth = special ? 3 : 1;
      el.textContent = special ? '💛' : hearts[Math.floor(Math.random()*hearts.length)];
      el.style.fontSize = (special ? 52 : 30 + Math.random()*16) + 'px';
    }

    el.style.left = (Math.random()*84 + 5) + 'vw';
    el.style.setProperty('--rot', (Math.random()*60 - 30) + 'deg');
    el.style.animation = `floatUp ${4.5 + Math.random()*3}s linear forwards`;
    el.addEventListener('click', e => collect(e, el, worth));
    el.addEventListener('animationend', () => el.remove());
    layer.appendChild(el);
  }

  function collect(e, el, worth){
    if(el.classList.contains('pop')) return;
    score += worth;
    if(score < 0) score = 0;                          // مش بتنزل تحت الصفر
    scoreEl.textContent = Math.min(score, target);

    const pu = document.createElement('div');
    pu.className = 'score-popup' + (worth < 0 ? ' minus' : '');
    pu.textContent = (worth > 0 ? '+' : '') + worth;
    pu.style.left = e.clientX + 'px';
    pu.style.top = e.clientY + 'px';
    document.body.appendChild(pu);
    setTimeout(() => pu.remove(), 700);

    el.classList.add('pop');
    setTimeout(() => el.remove(), 300);

    if(score >= target) winGame();
  }

  function winGame(){
    spawning = false;
    clearInterval(spawner);
    setTimeout(() => { layer.innerHTML = ''; }, 400);
    scoreEl.textContent = target;
    document.getElementById('gameInstruction').textContent =
      'برافو يا ' + CONFIG.herName + '! 🎉 دوسي على هديتك ❤️';
    const btn = document.getElementById('giftBtn');
    btn.classList.remove('locked');
    btn.classList.add('unlocked');
  }

  const spawner = setInterval(spawn, 650);
  for(let i=0;i<4;i++) setTimeout(spawn, i*200);
}

/* ---------- الألعاب النارية ---------- */
function launchFireworks(){
  const c = document.getElementById('fireworks');
  const ctx = c.getContext('2d');
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  resize(); addEventListener('resize', resize);

  const colors = ['#ffd479','#ff7eb3','#fff4e6','#a98bff','#7ee8c0','#ff9a6b'];
  let particles = [];

  function burst(x, y){
    const count = 70 + Math.floor(Math.random()*40);
    const color = colors[Math.floor(Math.random()*colors.length)];
    for(let i=0;i<count;i++){
      const ang = (Math.PI*2) * (i/count);
      const sp = Math.random()*5 + 2;
      particles.push({
        x, y,
        vx: Math.cos(ang)*sp,
        vy: Math.sin(ang)*sp,
        life: 1,
        color: Math.random() < .3 ? colors[Math.floor(Math.random()*colors.length)] : color,
        size: Math.random()*2.5 + 1.2
      });
    }
  }

  // فرقعة كل شوية في أماكن عشوائية
  const auto = setInterval(() => {
    burst(Math.random()*c.width, Math.random()*c.height*0.55 + c.height*0.08);
  }, 700);

  // دفعة كبيرة في الأول
  for(let i=0;i<6;i++){
    setTimeout(() => burst(Math.random()*c.width, Math.random()*c.height*0.5 + 60), i*220);
  }

  // فرقعة لما تلمس الشاشة كمان
  addEventListener('pointerdown', e => burst(e.clientX, e.clientY));

  (function loop(){
    ctx.fillStyle = 'rgba(20,8,43,0.16)';
    ctx.fillRect(0,0,c.width,c.height);
    particles.forEach(p => {
      p.vy += 0.045;          // جاذبية
      p.vx *= 0.99; p.vy *= 0.99;
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.012;
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.life > 0);
    requestAnimationFrame(loop);
  })();

  // نخفّف الفرقعة التلقائية بعد دقيقة ونص
  setTimeout(() => clearInterval(auto), 90000);
}

/* للتجربة: اكتب في الـ console الكلمة  test()  عشان تشوف الاحتفال على طول */
window.test = startCelebration;
